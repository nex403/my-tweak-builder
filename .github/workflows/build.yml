name: Build Tweak
on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm make zip git curl Build-essential

      - name: Setup Theos Environment
        run: |
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"
          echo "THEOS=~/theos" >> $GITHUB_ENV

      - name: Install iOS Toolchain for Linux
        run: |
          mkdir -p ~/theos/toolchain/linux/iphone
          curl -LO https://github.com/theos/toolchain/releases/download/linux-x86_64/toolchain-linux-x86_64.tar.gz
          tar -xf toolchain-linux-x86_64.tar.gz -C ~/theos/toolchain/linux/iphone/
          rm toolchain-linux-x86_64.tar.gz

      - name: Download iOS SDK
        run: |
          git clone https://github.com/theos/sdks.git ~/theos/sdks

      - name: Compile Dylib
        run: |
          export THEOS=~/theos
          make FINALPACKAGE=1 ARCHS=arm64 Messages=0

      - name: Upload Dynamic Library
        uses: actions/upload-artifact@v3
        with:
          name: LocationTest-Dylib
          path: .theos/obj/arm64/*.dylib
